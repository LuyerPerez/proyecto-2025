<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - TripBooker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="script.js">
    <script src="https://kit.fontawesome.com/5bdadf922f.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="contenedor">
        <div class="login-container">
            <h2><i class="fa-solid fa-user"></i> Inicio de Sesión</h2>
            <p class="subtitulo">Inicia sesión o crea una cuenta con tu email</p>
            <form action="" method="POST">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>&nbsp;
                    <input type="email" id="email" name="email" placeholder="Correo Electrónico" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>&nbsp;
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>
                    <i class="fa-solid fa-eye" id="togglePassword" onclick="verContraseña()" style="cursor: pointer;"></i>
                </div>
                <button type="submit" class="btn-login">Iniciar Sesión</button>
                <p>¿No tienes una cuenta? <a href="register.html" class="link">Crea una ahora</a></p>
                <p class="divider">o continúa con</p>
                <div class="social-login">
                    <button class="google-btn"><i class="fa-brands fa-google"></i> Google</button>
                    <button class="facebook-btn"><i class="fa-brands fa-facebook"></i> Facebook</button>
                </div>
                <p class="terms">Al crear tu cuenta, aceptas nuestro <a href="#">Aviso de privacidad</a> y los <a href="#">Términos y condiciones</a>.</p>
                <br>
                <a href="index.html" class="link"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a></a>
            </form>
        </div>
    </div>

    <script>
        function verContraseña() {
            const passwordInput = document.getElementById("password");
            const toggleIcon = document.getElementById("togglePassword");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
